  <path d="M196 312V205c0-31 24-56 60-56s60 25 60 56v107" fill="#fff5e2" stroke="#1d2330" stroke-width="10"/>
  <path d="M225 312v-73c0-18 13-32 31-32s31 14 31 32v73" fill="url(#red)" stroke="#1d2330" stroke-width="9"/>
  <circle cx="273" cy="264" r="4.5" fill="#ffe9ad"/>

