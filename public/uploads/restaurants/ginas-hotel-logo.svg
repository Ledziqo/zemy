  </defs>
  <rect width="512" height="512" rx="112" fill="#151922"/>
  <circle cx="256" cy="256" r="201" fill="url(#bg)" filter="url(#softShadow)"/>
  <circle cx="256" cy="256" r="184" fill="none" stroke="#d9bf92" stroke-width="6"/>
