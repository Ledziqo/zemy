<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Gina's Hotel logo</title>
  <desc id="desc">A refined circular hotel logo with an arched doorway, window lights, and Gina's Hotel lettering.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8ee"/>
      <stop offset="1" stop-color="#f3dfbf"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f04c55"/>
      <stop offset="1" stop-color="#a91522"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#2d1312" flood-opacity=".18"/>
